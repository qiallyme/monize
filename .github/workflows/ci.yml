name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only access for all jobs. Jobs that need more (e.g. the
# build-and-push job which pushes a version commit and GHCR images) opt in
# with their own `permissions:` block. See CWE-275.
permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-coverage
          path: backend/coverage/

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monize_test
          POSTGRES_USER: monize_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: monize_test
      DATABASE_USER: monize_test
      DATABASE_PASSWORD: test_password
      JWT_SECRET: test-jwt-secret-for-ci-minimum-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: cd backend && npm ci && npm audit --audit-level=high
      - run: cd frontend && npm ci && npm audit --audit-level=high

  bearer-scan:
    name: Bearer Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bearer
        uses: bearer/bearer-action@v2
        with:
          # We explicitly don't provide HTTPS out-of-the-box since most users self-host in environments where HTTPS is terminated at a reverse proxy, and we provide guidance on how to securely configure this in our docs. 
          # We also have some known exception messages that contain payee names which would otherwise be flagged as potential secrets, but we have determined that the risk of these being exploited is low and the value of having the full exception message in our logs outweighs the risk.
          skip-rule: "javascript_lang_logger_leak,javascript_express_https_protocol_missing,javascript_lang_exception" 
          # Exclude some false positives and low-risk findings that we are aware of and have accepted for now. We can re-evaluate these over time to see if any should be remediated.
          # b65bd7b1a0585cd1d0a326cdb09ce40d_0 - Hard-coded secret used for demo site
          # da119900eefffd8b84e7693e0388568a_0 - Hard-coded secret used for E2E tests
          # 95857358158e4664c01c05441df9f2a9_0 - Hard-coded secret used for demo site
          # 842822dd22cd4403ab5800ac89480c0a_0 - Insufficient randomness for inconsequential task
          # aa2e6330aede1004652f740df19e1d86_0 - Insufficient randomness for inconsequential task
          # b04cb91b90deb5e16504baa7ab95f678_0 - Unsanitized dynamic input in file path [CWE-22]
          # b04cb91b90deb5e16504baa7ab95f678_1 - Unsanitized dynamic input in file path [CWE-22]
          # b04cb91b90deb5e16504baa7ab95f678_2 - Unsanitized dynamic input in file path [CWE-22]
          exclude-fingerprint: "b65bd7b1a0585cd1d0a326cdb09ce40d_0,da119900eefffd8b84e7693e0388568a_0,95857358158e4664c01c05441df9f2a9_0,842822dd22cd4403ab5800ac89480c0a_0,aa2e6330aede1004652f740df19e1d86_0,b04cb91b90deb5e16504baa7ab95f678_0,b04cb91b90deb5e16504baa7ab95f678_1,b04cb91b90deb5e16504baa7ab95f678_2"

  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      [
        backend-lint,
        backend-unit-tests,
        backend-integration-tests,
        frontend-lint,
        frontend-unit-tests,
        npm-audit,
        bearer-scan,
        e2e-tests,
      ]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./backend/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"
          cd backend  && npm version "$NEW_VERSION" --no-git-tag-version && cd ..
          cd frontend && npm version "$NEW_VERSION" --no-git-tag-version && cd ..

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build metadata
        id: meta
        run: |
          echo "git_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          tags: |
            ghcr.io/kenlasko/monize-backend:latest
            ghcr.io/kenlasko/monize-backend:${{ steps.version.outputs.version }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.version.outputs.version }}
          annotations: |
            index:org.opencontainers.image.title=Monize Backend
            index:org.opencontainers.image.description=Backend for Monize, a self-hosted personal finance app
            index:org.opencontainers.image.source=https://github.com/kenlasko/monize
            index:org.opencontainers.image.url=https://github.com/kenlasko/monize
            index:org.opencontainers.image.authors=ken.lasko@gmail.com
            index:org.opencontainers.image.vendor=Ken Lasko
            index:org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            index:org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            index:org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          tags: |
            ghcr.io/kenlasko/monize-frontend:latest
            ghcr.io/kenlasko/monize-frontend:${{ steps.version.outputs.version }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.version.outputs.version }}
          annotations: |
            index:org.opencontainers.image.title=Monize Frontend
            index:org.opencontainers.image.description=Frontend for Monize, a self-hosted personal finance app
            index:org.opencontainers.image.source=https://github.com/kenlasko/monize
            index:org.opencontainers.image.url=https://github.com/kenlasko/monize
            index:org.opencontainers.image.authors=ken.lasko@gmail.com
            index:org.opencontainers.image.vendor=Ken Lasko
            index:org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            index:org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            index:org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/package.json backend/package-lock.json frontend/package.json frontend/package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

  # Runs the Playwright suite against a full stack (postgres + backend +
  # frontend) brought up via docker-compose.e2e.yml. Runs chromium + firefox.
  # Gates releases: build-and-push lists this job in its needs, so a red E2E
  # run blocks the container build/push. Retries (2 in CI) absorb flakiness.
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build application images
        run: docker compose -f docker-compose.e2e.yml build

      - name: Start application stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --wait-timeout 600

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-firefox-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        working-directory: e2e
        timeout-minutes: 30
        env:
          BASE_URL: http://localhost:3001
          CI: 'true'
        run: |
          set -o pipefail
          npx playwright test --max-failures=5 2>&1 | tee /tmp/pw-output.txt

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: e2e/playwright-report/
          retention-days: 7

      # The auth-gated raw logs aren't reachable programmatically, so mirror
      # container status + logs into both the job summary AND a PR comment.
      - name: Collect diagnostics on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '## E2E diagnostics'
            echo
            if [ -f /tmp/pw-output.txt ]; then
              echo '### Playwright output (tail)'
              echo '```'
              tail -c 12000 /tmp/pw-output.txt
              echo '```'
            fi
            echo '### docker compose ps'
            echo '```'
            docker compose -f docker-compose.e2e.yml ps -a 2>&1 || true
            echo '```'
            for svc in postgres backend frontend; do
              echo "<details><summary>$svc (last 150 lines)</summary>"
              echo
              echo '```'
              docker compose -f docker-compose.e2e.yml logs "$svc" --no-color --tail=150 2>&1 | tail -c 16000 || true
              echo '```'
              echo
              echo '</details>'
            done
          } > /tmp/e2e-diag.md
          cat /tmp/e2e-diag.md >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$PR_NUMBER" ]; then
            jq -Rs '{body: .}' /tmp/e2e-diag.md > /tmp/e2e-diag.json
            http=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              -d @/tmp/e2e-diag.json)
            echo "PR comment POST -> HTTP $http"
            [ "$http" = "201" ] || cat /tmp/resp.json
          fi

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
