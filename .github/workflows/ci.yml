name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only access for all jobs. Jobs that need more (e.g. the
# build-and-push job which pushes a version commit and GHCR images) opt in
# with their own `permissions:` block. See CWE-275.
permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-unit-coverage
          path: backend/coverage/

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monize_test
          POSTGRES_USER: monize_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: monize_test
      DATABASE_USER: monize_test
      DATABASE_PASSWORD: test_password
      JWT_SECRET: test-jwt-secret-for-ci-minimum-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-coverage
          path: frontend/coverage/

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: cd backend && npm ci && npm audit --audit-level=high
      - run: cd frontend && npm ci && npm audit --audit-level=high

  license-check:
    name: License Compliance (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      # Allow permissive licenses + AGPL-3.0 (the project's own license).
      # Anything else (GPL-2.0, LGPL with conditions, proprietary, UNKNOWN)
      # fails the build until explicitly reviewed.
      - name: Check licenses
        run: |
          npx --yes license-checker-rseidelsohn \
            --production \
            --excludePrivatePackages \
            --onlyAllow 'MIT;MIT-0;Apache-2.0;BSD-2-Clause;BSD-3-Clause;BSD;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0;BlueOak-1.0.0;AGPL-3.0;AGPL-3.0-only;WTFPL'

  schema-drift:
    name: Schema vs Migrations Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Verify schema.sql matches migrations state
        run: scripts/verify-schema.sh

  frontend-bundle-size:
    name: Frontend Bundle Size
    runs-on: ubuntu-latest
    # Skip on the build-and-push commit so we don't double-build on main.
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
        env:
          # Same env the e2e build uses so the bundle reflects production output.
          NODE_ENV: production
      - name: Report bundle sizes
        run: |
          {
            echo "## Frontend bundle sizes"
            echo
            echo '| Path | Size |'
            echo '|------|------|'
            # Top 20 largest files under .next/static
            find .next/static -type f -printf '%s\t%P\n' \
              | sort -rn | head -20 \
              | awk '{ printf "| %s | %.1f KB |\n", $2, $1/1024 }'
            echo
            echo '### Totals'
            echo
            TOTAL_STATIC=$(du -sb .next/static | cut -f1)
            TOTAL_STANDALONE=$(du -sb .next/standalone 2>/dev/null | cut -f1 || echo 0)
            printf -- '- .next/static: **%.1f MB**\n' "$(echo "$TOTAL_STATIC/1048576" | bc -l)"
            printf -- '- .next/standalone: **%.1f MB**\n' "$(echo "$TOTAL_STANDALONE/1048576" | bc -l)"
          } >> "$GITHUB_STEP_SUMMARY"

  env-doc-check:
    name: Env Var Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - name: Verify env vars are documented
        run: node scripts/check-env-docs.mjs

  zizmor-scan:
    name: Workflow Security Scan (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
      - name: Install zizmor
        run: uv tool install zizmor
      - name: Run zizmor
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  dockerfile-lint:
    name: Dockerfile Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: backend/Dockerfile
          config: .hadolint.yaml
      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          config: .hadolint.yaml

  bearer-scan:
    name: Bearer Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Bearer
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc # v2
        with:
          # We explicitly don't provide HTTPS out-of-the-box since most users self-host in environments where HTTPS is terminated at a reverse proxy, and we provide guidance on how to securely configure this in our docs. 
          # We also have some known exception messages that contain payee names which would otherwise be flagged as potential secrets, but we have determined that the risk of these being exploited is low and the value of having the full exception message in our logs outweighs the risk.
          skip-rule: "javascript_lang_logger_leak,javascript_express_https_protocol_missing,javascript_lang_exception" 
          # Exclude some false positives and low-risk findings that we are aware of and have accepted for now.
          # Each entry has a "review-by" date; the bearer-exceptions-review workflow
          # opens an issue when any entry is past due, so exceptions don't become permanent debt.
          # b65bd7b1a0585cd1d0a326cdb09ce40d_0 - Hard-coded secret used for demo site - review-by: 2026-09-04
          # da119900eefffd8b84e7693e0388568a_0 - Hard-coded secret used for E2E tests - review-by: 2026-09-04
          # 95857358158e4664c01c05441df9f2a9_0 - Hard-coded secret used for demo site - review-by: 2026-09-04
          # 842822dd22cd4403ab5800ac89480c0a_0 - Insufficient randomness for inconsequential task - review-by: 2026-09-04
          # aa2e6330aede1004652f740df19e1d86_0 - Insufficient randomness for inconsequential task - review-by: 2026-09-04
          # b04cb91b90deb5e16504baa7ab95f678_0 - Unsanitized dynamic input in file path [CWE-22] - review-by: 2026-09-04
          # b04cb91b90deb5e16504baa7ab95f678_1 - Unsanitized dynamic input in file path [CWE-22] - review-by: 2026-09-04
          # b04cb91b90deb5e16504baa7ab95f678_2 - Unsanitized dynamic input in file path [CWE-22] - review-by: 2026-09-04
          exclude-fingerprint: "b65bd7b1a0585cd1d0a326cdb09ce40d_0,da119900eefffd8b84e7693e0388568a_0,95857358158e4664c01c05441df9f2a9_0,842822dd22cd4403ab5800ac89480c0a_0,aa2e6330aede1004652f740df19e1d86_0,b04cb91b90deb5e16504baa7ab95f678_0,b04cb91b90deb5e16504baa7ab95f678_1,b04cb91b90deb5e16504baa7ab95f678_2"

  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      [
        backend-lint,
        backend-unit-tests,
        backend-integration-tests,
        frontend-lint,
        frontend-unit-tests,
        npm-audit,
        bearer-scan,
        dockerfile-lint,
        license-check,
        schema-drift,
        zizmor-scan,
        env-doc-check,
        e2e-tests,
      ]
    permissions:
      contents: write
      packages: write
      # Needed for cosign keyless signing and SBOM/provenance attestations
      # via GitHub's OIDC token.
      id-token: write
      attestations: write
      # Needed for Trivy to upload SARIF results to the Security tab.
      security-events: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./backend/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"
          cd backend  && npm version "$NEW_VERSION" --no-git-tag-version && cd ..
          cd frontend && npm version "$NEW_VERSION" --no-git-tag-version && cd ..

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set build metadata
        id: meta
        run: |
          echo "git_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: backend/Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/kenlasko/monize-backend:latest
            ghcr.io/kenlasko/monize-backend:${{ steps.version.outputs.version }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.version.outputs.version }}
          annotations: |
            index:org.opencontainers.image.title=Monize Backend
            index:org.opencontainers.image.description=Backend for Monize, a self-hosted personal finance app
            index:org.opencontainers.image.source=https://github.com/kenlasko/monize
            index:org.opencontainers.image.url=https://github.com/kenlasko/monize
            index:org.opencontainers.image.authors=ken.lasko@gmail.com
            index:org.opencontainers.image.vendor=Ken Lasko
            index:org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            index:org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            index:org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: frontend
          file: frontend/Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/kenlasko/monize-frontend:latest
            ghcr.io/kenlasko/monize-frontend:${{ steps.version.outputs.version }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.version.outputs.version }}
          annotations: |
            index:org.opencontainers.image.title=Monize Frontend
            index:org.opencontainers.image.description=Frontend for Monize, a self-hosted personal finance app
            index:org.opencontainers.image.source=https://github.com/kenlasko/monize
            index:org.opencontainers.image.url=https://github.com/kenlasko/monize
            index:org.opencontainers.image.authors=ken.lasko@gmail.com
            index:org.opencontainers.image.vendor=Ken Lasko
            index:org.opencontainers.image.revision=${{ steps.meta.outputs.git_sha }}
            index:org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            index:org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # Keyless signing via GitHub OIDC. No long-lived keys to manage; the
      # signature is bound to this workflow's identity and verifiable with
      # `cosign verify --certificate-identity-regexp ...`.
      - name: Sign backend image
        env:
          DIGEST: ${{ steps.build-backend.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cosign sign --yes \
            "ghcr.io/kenlasko/monize-backend@${DIGEST}" \
            "ghcr.io/kenlasko/monize-backend:${VERSION}" \
            ghcr.io/kenlasko/monize-backend:latest

      - name: Sign frontend image
        env:
          DIGEST: ${{ steps.build-frontend.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cosign sign --yes \
            "ghcr.io/kenlasko/monize-frontend@${DIGEST}" \
            "ghcr.io/kenlasko/monize-frontend:${VERSION}" \
            ghcr.io/kenlasko/monize-frontend:latest

      # Generate and attest an SPDX SBOM for each image. The provenance and
      # SBOM produced by docker/build-push-action above are embedded in the
      # OCI manifest; these attestations make them discoverable via
      # `gh attestation verify` for downstream consumers.
      - name: Generate backend SBOM
        uses: anchore/sbom-action@fd74a6fb98a204a1ad35bbfae0122c1a302ff88b # v0.15.0
        with:
          image: ghcr.io/kenlasko/monize-backend@${{ steps.build-backend.outputs.digest }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Attest backend SBOM
        uses: actions/attest-sbom@cbfd0027ae731a5892db25ecd226930d7ffd19eb # v2.1.0
        with:
          subject-name: ghcr.io/kenlasko/monize-backend
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          sbom-path: backend-sbom.spdx.json
          push-to-registry: true

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@fd74a6fb98a204a1ad35bbfae0122c1a302ff88b # v0.15.0
        with:
          image: ghcr.io/kenlasko/monize-frontend@${{ steps.build-frontend.outputs.digest }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Attest frontend SBOM
        uses: actions/attest-sbom@cbfd0027ae731a5892db25ecd226930d7ffd19eb # v2.1.0
        with:
          subject-name: ghcr.io/kenlasko/monize-frontend
          subject-digest: ${{ steps.build-frontend.outputs.digest }}
          sbom-path: frontend-sbom.spdx.json
          push-to-registry: true

      # Scan the pushed images for OS + library CVEs. SARIF goes to the
      # Security tab so findings are tracked over time. We fail on CRITICAL
      # only - HIGH issues surface in the Security tab but do not block
      # releases, matching the npm-audit policy.
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ghcr.io/kenlasko/monize-backend@${{ steps.build-backend.outputs.digest }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload backend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ghcr.io/kenlasko/monize-frontend@${{ steps.build-frontend.outputs.digest }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload frontend Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Fail on critical CVEs (backend)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ghcr.io/kenlasko/monize-backend@${{ steps.build-backend.outputs.digest }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Fail on critical CVEs (frontend)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ghcr.io/kenlasko/monize-frontend@${{ steps.build-frontend.outputs.digest }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/package.json backend/package-lock.json frontend/package.json frontend/package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

  # Pre-download and cache the Playwright browsers ONCE, before the sharded
  # test jobs run. The shards then restore from this cache (guaranteed hit) and
  # never touch cdn.playwright.dev themselves. This avoids the failure we hit
  # when four shards raced on a cold cache: the ones that missed downloaded
  # browsers concurrently and some downloads stalled indefinitely (the Playwright
  # downloader has no timeout), wedging the whole job. The download timeout below
  # also caps any future CDN stall so this job fails fast and can be re-run
  # instead of hanging.
  e2e-browsers:
    name: E2E Browser Cache
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-firefox-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - name: Download Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        timeout-minutes: 15
        run: npx playwright install chromium firefox

  # Runs the Playwright suite against a full stack (postgres + backend +
  # frontend) brought up via docker-compose.e2e.yml. Runs chromium + firefox.
  # Gates releases: build-and-push lists this job in its needs, so a red E2E
  # run blocks the container build/push. Retries (2 in CI) absorb flakiness.
  e2e-tests:
    name: E2E Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    # Depends on e2e-browsers so the Playwright cache is fully populated before
    # any shard starts; the backend/frontend unit-test gate is inherited
    # transitively through e2e-browsers.
    needs: [e2e-browsers]
    # Shard across 4 runners. Each shard brings up its OWN isolated stack
    # (postgres + backend + frontend) below, so there is no shared database
    # state between shards. Within a shard Playwright still runs serially
    # (workers: 1 in playwright.config.ts), preserving the existing ordering
    # guarantees (e.g. zz-danger-zone last). fail-fast: false lets every shard
    # finish so we see all failures, not just the first shard to go red.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Build application images
        run: docker compose -f docker-compose.e2e.yml build

      - name: Start application stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --wait-timeout 600

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-firefox-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      # Browsers come from the cache populated by e2e-browsers, so normally only
      # the apt system deps are installed here (fast, no CDN download). The else
      # branch is a safety net for the rare case the cache was evicted between
      # jobs; the timeout caps a stalled download instead of hanging the shard.
      - name: Install Playwright system dependencies
        working-directory: e2e
        timeout-minutes: 10
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium firefox
          else
            npx playwright install --with-deps chromium firefox
          fi

      - name: Run E2E tests
        working-directory: e2e
        timeout-minutes: 30
        env:
          BASE_URL: http://localhost:3001
          CI: 'true'
        run: |
          set -o pipefail
          npx playwright test --shard=${{ matrix.shard }}/4 --max-failures=5 2>&1 | tee /tmp/pw-output.txt

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report/
          retention-days: 7

      # The auth-gated raw logs aren't reachable programmatically, so mirror
      # container status + logs into both the job summary AND a PR comment.
      - name: Collect diagnostics on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## E2E diagnostics (shard ${{ matrix.shard }}/4)"
            echo
            if [ -f /tmp/pw-output.txt ]; then
              echo '### Playwright output (tail)'
              echo '```'
              tail -c 12000 /tmp/pw-output.txt
              echo '```'
            fi
            echo '### docker compose ps'
            echo '```'
            docker compose -f docker-compose.e2e.yml ps -a 2>&1 || true
            echo '```'
            for svc in postgres backend frontend; do
              echo "<details><summary>$svc (last 150 lines)</summary>"
              echo
              echo '```'
              docker compose -f docker-compose.e2e.yml logs "$svc" --no-color --tail=150 2>&1 | tail -c 16000 || true
              echo '```'
              echo
              echo '</details>'
            done
          } > /tmp/e2e-diag.md
          cat /tmp/e2e-diag.md >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$PR_NUMBER" ]; then
            jq -Rs '{body: .}' /tmp/e2e-diag.md > /tmp/e2e-diag.json
            http=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              -d @/tmp/e2e-diag.json)
            echo "PR comment POST -> HTTP $http"
            [ "$http" = "201" ] || cat /tmp/resp.json
          fi

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
