name: Lighthouse CI

# Accessibility, performance, and best-practices regression checks. Runs on PR
# against public routes (the e2e stack does not auto-seed an authenticated
# session, so we only audit pre-login pages here). Thresholds are conservative
# starting points - tune after the first few runs to match reality.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.e2e.yml'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Build application images
        run: docker compose -f docker-compose.e2e.yml build

      - name: Start application stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --wait-timeout 600

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          urls: |
            http://localhost:3001/login
            http://localhost:3001/forgot-password
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
