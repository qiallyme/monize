services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    image: monize-backend:supabase
    container_name: monize-backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-postgres}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL:-true}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-${PUBLIC_APP_URL}}
      MSN_API_KEY: ${MSN_API_KEY}
      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-true}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      FORCE_2FA: ${FORCE_2FA:-false}
      REMEMBER_ME_DAYS: ${REMEMBER_ME_DAYS:-30}
      DEMO_MODE: ${DEMO_MODE:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_CALLBACK_URL: ${OIDC_CALLBACK_URL:-}
      OIDC_REQUIRE_VERIFIED_EMAIL: ${OIDC_REQUIRE_VERIFIED_EMAIL:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-}
      AI_DEFAULT_API_KEY: ${AI_DEFAULT_API_KEY:-}
      AI_DEFAULT_BASE_URL: ${AI_DEFAULT_BASE_URL:-}
      DISABLE_HTTPS_HEADERS: ${DISABLE_HTTPS_HEADERS:-false}
    networks:
      - monize-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/api/v1/health/live').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: monize-frontend:supabase
    container_name: monize-frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:-3000}
      INTERNAL_API_URL: http://backend:${BACKEND_PORT:-3000}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      DISABLE_HTTPS_HEADERS: ${DISABLE_HTTPS_HEADERS:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    networks:
      - monize-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/api/v1/health/live').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  monize-network:
    driver: bridge
